components:
  schemas:
    VertexBackPressureLevel:
      type: string
      enum:
      - ok
      - low
      - high
    SerializedValueOptionalFailureObject:
      type: object
      properties:
        byteArray:
          type: array
          items:
            type: string
            format: byte
    SubtasksTimesInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        now:
          type: integer
          format: int64
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/SubtaskTimeInfo'
    SubtaskAccumulatorsInfo:
      type: object
      properties:
        attempt:
          type: integer
          format: int32
        endpoint:
          type: string
        subtask:
          type: integer
          format: int32
        user-accumulators:
          type: array
          items:
            $ref: '#/components/schemas/UserAccumulator'
    JobStatus:
      type: string
      enum:
      - INITIALIZING
      - CREATED
      - RUNNING
      - FAILING
      - FAILED
      - CANCELLING
      - CANCELED
      - FINISHED
      - RESTARTING
      - SUSPENDED
      - RECONCILING
    SubtaskTimeInfo:
      type: object
      properties:
        duration:
          type: integer
          format: int64
        endpoint:
          type: string
        subtask:
          type: integer
          format: int32
        timestamps:
          type: object
          additionalProperties:
            type: integer
            format: int64
    Counts:
      type: object
      properties:
        completed:
          type: integer
          format: int64
        failed:
          type: integer
          format: int64
        in_progress:
          type: integer
          format: int32
        restored:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
    JobIdWithStatus:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/JobID'
        status:
          $ref: '#/components/schemas/JobStatus'
    CheckpointStatisticsSummary:
      type: object
      properties:
        alignment_buffered:
          $ref: '#/components/schemas/StatsSummaryDto'
        checkpointed_size:
          $ref: '#/components/schemas/StatsSummaryDto'
        end_to_end_duration:
          $ref: '#/components/schemas/StatsSummaryDto'
        persisted_data:
          $ref: '#/components/schemas/StatsSummaryDto'
        processed_data:
          $ref: '#/components/schemas/StatsSummaryDto'
        state_size:
          $ref: '#/components/schemas/StatsSummaryDto'
    LatestCheckpoints:
      type: object
      properties:
        completed:
          $ref: '#/components/schemas/CompletedCheckpointStatistics'
        failed:
          $ref: '#/components/schemas/FailedCheckpointStatistics'
        restored:
          $ref: '#/components/schemas/RestoredCheckpointStatistics'
        savepoint:
          $ref: '#/components/schemas/CompletedCheckpointStatistics'
    ResourceID:
      pattern: '[0-9a-f]{32}'
      type: string
    ProcessingMode:
      type: string
      enum:
      - AT_LEAST_ONCE
      - EXACTLY_ONCE
    QueueStatus:
      required:
      - id
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
    AggregatedMetricsResponseBody:
      type: object
    CompletedCheckpointStatistics:
      type: object
      allOf:
      - $ref: '#/components/schemas/CheckpointStatistics'
      - type: object
        properties:
          external_path:
            type: string
          discarded:
            type: boolean
    CheckpointInfo:
      type: object
      properties:
        checkpointId:
          type: integer
          format: int64
        failureCause:
          $ref: '#/components/schemas/SerializedThrowable'
    RestAPICheckpointType:
      type: string
      enum:
      - CHECKPOINT
      - UNALIGNED_CHECKPOINT
      - SAVEPOINT
      - SYNC_SAVEPOINT
    TriggerId:
      pattern: '[0-9a-f]{32}'
      type: string
    AsynchronousOperationResult:
      type: object
      properties:
        operation:
          oneOf:
          - $ref: '#/components/schemas/AsynchronousOperationInfo'
          - $ref: '#/components/schemas/CheckpointInfo'
          - $ref: '#/components/schemas/SavepointInfo'
        status:
          $ref: '#/components/schemas/QueueStatus'
    JobVertexDetailsInfo:
      type: object
      properties:
        aggregated:
          $ref: '#/components/schemas/AggregatedTaskDetailsInfo'
        id:
          $ref: '#/components/schemas/JobVertexID'
        maxParallelism:
          type: integer
          format: int32
        name:
          type: string
        now:
          type: integer
          format: int64
        parallelism:
          type: integer
          format: int32
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/SubtaskExecutionAttemptDetailsInfo'
    TaskCheckpointStatisticsWithSubtaskDetailsSummary:
      type: object
      properties:
        alignment:
          $ref: '#/components/schemas/CheckpointAlignmentSummary'
        checkpoint_duration:
          $ref: '#/components/schemas/CheckpointDurationSummary'
        checkpointed_size:
          $ref: '#/components/schemas/StatsSummaryDto'
        end_to_end_duration:
          $ref: '#/components/schemas/StatsSummaryDto'
        start_delay:
          $ref: '#/components/schemas/StatsSummaryDto'
        state_size:
          $ref: '#/components/schemas/StatsSummaryDto'
    SubtaskExecutionAttemptDetailsInfo:
      type: object
      properties:
        attempt:
          type: integer
          format: int32
        duration:
          type: integer
          format: int64
        end-time:
          type: integer
          format: int64
        endpoint:
          type: string
        metrics:
          $ref: '#/components/schemas/IOMetricsInfo'
        other-concurrent-attempts:
          type: array
          items:
            $ref: '#/components/schemas/SubtaskExecutionAttemptDetailsInfo'
        start-time:
          type: integer
          format: int64
        status:
