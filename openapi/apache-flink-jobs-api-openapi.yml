        status-duration:
          type: object
          additionalProperties:
            type: integer
            format: int64
        subtask:
          type: integer
          format: int32
        taskmanager-id:
          type: string
    SubtasksAllAccumulatorsInfo:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/JobVertexID'
        parallelism:
          type: integer
          format: int32
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/SubtaskAccumulatorsInfo'
    JobDetails:
      type: object
      properties:
        duration:
          type: integer
          format: int64
        end-time:
          type: integer
          format: int64
        jid:
