        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jarid
          in: path
          type: string
          description: String value that identifies a jar. When uploading the jar a path is returned, where the filename is
            the ID. This value is equivalent to the `id` field in the l
