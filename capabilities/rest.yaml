        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: triggerid
          in: path
          type: string
          description: 32-character hexadecimal string that identifies an asynchronous operation trigger ID. The ID was returned
            then the operation was triggered.
          required: true
